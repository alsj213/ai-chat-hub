<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            transition: background 0.2s;
        }
        body.light { background: #f5f5f5; color: #333; }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 170px;
            background: #181825;
            display: flex;
            flex-direction: column;
            padding: 8px 0;
            gap: 1px;
            overflow-y: auto;
            flex-shrink: 0;
            border-right: 1px solid #313244;
            z-index: 10;
        }
        body.light .sidebar {
            background: #e8e8e8;
            border-right-color: #ccc;
        }

        .sidebar .title-bar {
            padding: 10px 14px 8px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #6c7086;
            letter-spacing: 1px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        body.light .sidebar .title-bar { color: #999; }

        .sb-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #a6adc8;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.1s;
            text-align: left;
            width: 100%;
            position: relative;
            border-radius: 0;
        }
        .sb-item:hover { background: rgba(255,255,255,0.06); color: #cdd6f4; }
        .sb-item.active {
            background: rgba(203,166,247,0.15);
            color: #cba6f7;
        }
        .sb-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: #cba6f7;
        }
        body.light .sb-item { color: #666; }
        body.light .sb-item:hover { background: rgba(0,0,0,0.05); color: #333; }
        body.light .sb-item.active {
            background: rgba(124,58,237,0.1);
            color: #7c3aed;
        }
        body.light .sb-item.active::before { background: #7c3aed; }

        .sb-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .sb-name { flex: 1; }
        .sb-tag {
            font-size: 0.6rem;
            padding: 1px 6px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: #6c7086;
            flex-shrink: 0;
        }
        body.light .sb-tag { background: rgba(0,0,0,0.06); color: #999; }

        /* ─── Top Bar ─── */
        .topbar {
            height: 36px;
            background: #181825;
            border-bottom: 1px solid #313244;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            flex-shrink: 0;
        }
        body.light .topbar { background: #e8e8e8; border-bottom-color: #ccc; }

        .topbar .url-bar {
            flex: 1;
            max-width: 450px;
            padding: 3px 10px;
            border-radius: 5px;
            border: 1px solid #313244;
            background: #11111b;
            color: #6c7086;
            font-size: 0.72rem;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        body.light .topbar .url-bar {
            background: #ddd;
            border-color: #bbb;
            color: #888;
        }

        .topbar .actions {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }
        .topbar .actions button {
            padding: 3px 10px;
            border-radius: 5px;
            border: 1px solid #313244;
            background: transparent;
            color: #6c7086;
            cursor: pointer;
            font-size: 0.72rem;
            transition: all 0.1s;
            white-space: nowrap;
        }
        .topbar .actions button:hover { background: #313244; color: #cdd6f4; }
        body.light .topbar .actions button { border-color: #bbb; color: #888; }
        body.light .topbar .actions button:hover { background: #ccc; color: #333; }

        .topbar .svc-name {
            font-size: 0.82rem;
            font-weight: 600;
            color: #cdd6f4;
            white-space: nowrap;
        }
        body.light .topbar .svc-name { color: #333; }

        /* ─── Content ─── */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .content { flex: 1; position: relative; background: #1e1e2e; }
        body.light .content { background: #f5f5f5; }

        .content iframe {
            width: 100%; height: 100%;
            border: none; display: block;
        }

        .welcome {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; color: #6c7086;
            text-align: center; padding: 40px;
        }
        body.light .welcome { color: #999; }
        .welcome h2 { font-size: 1.4rem; font-weight: 600; color: #a6adc8; }
        body.light .welcome h2 { color: #666; }
        .welcome p { font-size: 0.85rem; max-width: 360px; line-height: 1.6; }

        .welcome .quick-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 4px;
        }
        .welcome .quick-grid span {
            padding: 8px 20px;
            border-radius: 8px;
            background: #313244;
            color: #a6adc8;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.1s;
        }
        body.light .welcome .quick-grid span { background: #e0e0e0; color: #666; }
        .welcome .quick-grid span:hover {
            background: #cba6f7;
            color: #1e1e2e;
        }
        body.light .welcome .quick-grid span:hover { background: #7c3aed; color: white; }

        /* ─── Theme ─── */
        .theme-btn {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            cursor: pointer;
            background: transparent;
            border: none;
            color: #6c7086;
            font-size: 0.82rem;
            transition: all 0.1s;
            width: 100%;
            text-align: left;
        }
        .theme-btn:hover { background: rgba(255,255,255,0.06); color: #cdd6f4; }
        body.light .theme-btn:hover { background: rgba(0,0,0,0.05); color: #333; }

        .sidebar::-webkit-scrollbar { width: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: #313244; border-radius: 3px; }
        body.light .sidebar::-webkit-scrollbar-thumb { background: #bbb; }

        @media (max-width: 600px) {
            .sidebar { width: 140px; }
            .sb-item { padding: 7px 10px; font-size: 0.78rem; }
            .sb-icon { width: 22px; height: 22px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<nav class="sidebar" id="sidebar"></nav>

<div class="main">
    <div class="topbar">
        <span class="svc-name" id="tb-name">选择一个 AI</span>
        <span class="url-bar" id="tb-url"></span>
        <div class="actions">
            <button onclick="openNewWin()" title="在新窗口打开">↗ 新窗口</button>
            <button onclick="refreshFrame()" title="刷新">⟳</button>
        </div>
    </div>
    <div class="content" id="content-area">
        <div class="welcome" id="welcome">
            <h2>🤖 AI Chat Hub</h2>
            <p>左侧选择 AI 服务，即可在此嵌入使用。<br/>部分服务限制嵌入，可点击「新窗口」打开。</p>
            <div class="quick-grid" id="quick-list"></div>
        </div>
        <iframe id="main-frame" style="display:none;" sandbox="allow-scripts allow-forms allow-same-origin allow-popups" loading="lazy"></iframe>
    </div>
</div>

<script>
    const svcList = [
        { name: '豆包',     ico: '🫘', bg: '#1e9b5e', link: 'https://www.doubao.com',        tag: '免费' },
        { name: 'DeepSeek', ico: '🐋', bg: '#4f6ef7', link: 'https://chat.deepseek.com',     tag: '免费' },
        { name: '通义千问', ico: '🌐', bg: '#ff6a00', link: 'https://tongyi.aliyun.com',     tag: '免费' },
        { name: 'Kimi',     ico: '🌙', bg: '#7c3aed', link: 'https://kimi.moonshot.cn',      tag: '免费' },
        { name: '文心一言', ico: '📝', bg: '#2158f0', link: 'https://yiyan.baidu.com',       tag: '免费' },
        { name: '智谱清言', ico: '🧠', bg: '#0ba5e9', link: 'https://chatglm.cn',            tag: '免费' },
        { name: '讯飞星火', ico: '🔥', bg: '#d92e1e', link: 'https://xinghuo.xfyun.cn',      tag: '免费' },
        { name: '腾讯元宝', ico: '💎', bg: '#0057d9', link: 'https://yuanbao.tencent.com',   tag: '免费' },
        { name: '百川智能', ico: '🌊', bg: '#0077b6', link: 'https://www.baichuan-ai.com',   tag: '免费' },
        { name: '天工',     ico: '⚒️', bg: '#e85d2c', link: 'https://www.kunlungp.com',      tag: '免费' },
        { name: 'MiniMax',  ico: '✨', bg: '#a855f7', link: 'https://www.minimax.com',       tag: '免费' },
    ];

    let cur = null;
    const frame = document.getElementById('main-frame');
    const welcome = document.getElementById('welcome');

    function render() {
        const sb = document.getElementById('sidebar');
        sb.innerHTML = '<div class="title-bar">AI 服务</div>';

        svcList.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'sb-item';
            btn.dataset.name = s.name;
            btn.innerHTML = `
                <span class="sb-icon" style="background:${s.bg}">${s.ico}</span>
                <span class="sb-name">${s.name}</span>
                <span class="sb-tag">${s.tag}</span>
            `;
            btn.addEventListener('click', () => select(s));
            sb.appendChild(btn);
        });

        // Theme toggle
        const tb = document.createElement('button');
        tb.className = 'theme-btn';
        tb.id = 'theme-btn';
        tb.innerHTML = '<span>🌙</span><span>深色模式</span>';
        tb.addEventListener('click', toggleTheme);
        sb.appendChild(tb);

        // Quick shortcuts
        const ql = document.getElementById('quick-list');
        ['豆包', 'DeepSeek', 'Kimi', '通义千问'].forEach(n => {
            const s = svcList.find(x => x.name === n);
            if (!s) return;
            const el = document.createElement('span');
            el.textContent = `${s.ico} ${s.name}`;
            el.addEventListener('click', () => select(s));
            ql.appendChild(el);
        });
    }

    function select(s) {
        cur = s;
        document.querySelectorAll('.sb-item').forEach(el =>
            el.classList.toggle('active', el.dataset.name === s.name)
        );
        document.getElementById('tb-name').textContent = `${s.ico} ${s.name}`;
        document.getElementById('tb-url').textContent = s.link;

        welcome.style.display = 'none';
        frame.style.display = 'block';
        frame.src = s.link;
    }

    function openNewWin() {
        if (cur) window.open(cur.link, cur.name, 'width=1200,height=800');
    }

    function refreshFrame() {
        if (cur) { frame.src = cur.link; }
    }

    function toggleTheme() {
        document.body.classList.toggle('light');
        const isLight = document.body.classList.contains('light');
        document.getElementById('theme-btn').innerHTML =
            `<span>${isLight ? '☀️' : '🌙'}</span><span>${isLight ? '浅色模式' : '深色模式'}</span>`;
    }

    render();
</script>
</body>
</html>
